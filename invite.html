<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>邀请码验证</title>
<style>
body{margin:0;background:#f3f6fb;font-family:"Noto Sans JP",sans-serif;color:#0f172a}
.wrap{max-width:460px;margin:12vh auto;background:#fff;border:1px solid #dbe7ff;border-radius:14px;padding:22px;box-shadow:0 10px 24px rgba(15,23,42,.08)}
h1{font-size:22px;margin:0 0 8px}p{margin:0 0 16px;color:#475569}
input{width:100%;padding:10px 12px;border:1px solid #cbd5e1;border-radius:10px;font:inherit}
button{margin-top:10px;width:100%;padding:10px;border:none;border-radius:10px;background:#1d4ed8;color:#fff;font:inherit;cursor:pointer}
#msg{margin-top:12px;font-size:13px}
.link{margin-top:12px;text-align:right;font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <h1>利用開始</h1>
  <p>招待コードを入力してください。</p>
  <input id="code" placeholder="BUS-20260407-ABCD-EFGH" autocomplete="off">
  <button id="go">確認して入る</button>
  <div id="msg"></div>
  <div class="link"><a href="/admin-enter.html">管理员入口</a></div>
</div>
<script>
const msg=document.getElementById('msg');
document.getElementById('go').onclick=async()=>{
  const code=document.getElementById('code').value.trim();
  if(!code){msg.textContent='请输入邀请码';return;}
  msg.textContent='验证中...';
  const r=await fetch('/api/invite/redeem',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({code})});
  const j=await r.json().catch(()=>({ok:false}));
  if(j.ok){location.href='/';return;}
  const map={INVALID:'邀请码无效',DISABLED:'邀请码已禁用',EXPIRED:'邀请码已过期',USED_UP:'邀请码已用完'};
  msg.textContent=map[j.code]||'验证失败';
};
</script>
</body>
</html>
