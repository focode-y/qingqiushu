<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理员入口</title>
<style>
body{margin:0;background:#f3f6fb;font-family:"Noto Sans JP",sans-serif;color:#0f172a}
.wrap{max-width:460px;margin:12vh auto;background:#fff;border:1px solid #dbe7ff;border-radius:14px;padding:22px;box-shadow:0 10px 24px rgba(15,23,42,.08)}
h1{font-size:22px;margin:0 0 8px}p{margin:0 0 16px;color:#475569}
input{width:100%;padding:10px 12px;border:1px solid #cbd5e1;border-radius:10px;font:inherit}
button{margin-top:10px;width:100%;padding:10px;border:none;border-radius:10px;background:#111827;color:#fff;font:inherit;cursor:pointer}
#msg{margin-top:12px;font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <h1>管理员入口</h1>
  <p>输入管理员密钥，进入后台并免邀请码使用。</p>
  <input id="secret" type="password" placeholder="Admin Secret">
  <button id="go">进入</button>
  <div id="msg"></div>
</div>
<script>
const msg=document.getElementById('msg');
document.getElementById('go').onclick=async()=>{
  const secret=document.getElementById('secret').value;
  if(!secret){msg.textContent='请输入密钥';return;}
  msg.textContent='验证中...';
  const r=await fetch('/api/admin/enter',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({secret})});
  const j=await r.json().catch(()=>({ok:false}));
  if(j.ok){location.href='/admin-invites.html';return;}
  msg.textContent='密钥错误';
};
</script>
</body>
</html>
