<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>書類ナビゲーション</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
*{box-sizing:border-box} body{margin:0;font-family:'Noto Sans JP',sans-serif;background:linear-gradient(135deg,#eef4ff,#f7fbff);color:#0f172a}
.wrap{max-width:1100px;margin:24px auto;padding:0 16px}
.head{background:#fff;border:1px solid #dbe8ff;border-radius:14px;padding:18px 20px;box-shadow:0 8px 24px rgba(30,64,175,.08)}
.head h1{margin:0 0 8px;font-size:24px}.head p{margin:0;color:#475569}
.nav{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.tab{border:1px solid #bfdbfe;background:#eff6ff;color:#1d4ed8;padding:10px 14px;border-radius:10px;font-weight:700;cursor:pointer}
.tab.active{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.frame{margin-top:14px;background:#fff;border:1px solid #dbe8ff;border-radius:14px;overflow:hidden;box-shadow:0 8px 24px rgba(15,23,42,.08)}
iframe{width:100%;height:720px;border:0;background:#fff;overflow:hidden}
</style>
</head>
<body>
  <div class="wrap">
    <section class="head">
      <h1>書類作成</h1>
      <p>以下から「請求書」「領収書」を切り替えて作成できます。</p>
      <div class="nav">
        <button class="tab active" data-src="qingiushu.html">請求書</button>
        <button class="tab" data-src="ryoshushu.html">領収書</button>
      </div>
    </section>

    <section class="frame">
      <iframe id="docFrame" src="qingiushu.html" title="document" scrolling="no"></iframe>
    </section>
  </div>

<script>
const frame = document.getElementById('docFrame');
const tabs = [...document.querySelectorAll('.tab')];
function fitFrameHeight() {
  try {
    const doc = frame.contentWindow.document;
    const h = Math.max(
      doc.body ? doc.body.scrollHeight : 0,
      doc.documentElement ? doc.documentElement.scrollHeight : 0
    );
    frame.style.height = (h + 8) + 'px';
  } catch (e) {}
}
frame.addEventListener('load', () => {
  fitFrameHeight();
  setTimeout(fitFrameHeight, 120);
});
tabs.forEach(btn => {
  btn.addEventListener('click', () => {
    tabs.forEach(x => x.classList.remove('active'));
    btn.classList.add('active');
    frame.src = btn.dataset.src;
  });
});
window.addEventListener('resize', fitFrameHeight);
</script>
</body>
</html>
