<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>邀请码管理</title>
<style>
body{margin:0;background:#f3f6fb;font-family:"Noto Sans JP",sans-serif;color:#0f172a}
.wrap{max-width:1100px;margin:28px auto;padding:0 14px}
.card{background:#fff;border:1px solid #dbe7ff;border-radius:14px;padding:16px;box-shadow:0 10px 24px rgba(15,23,42,.08)}
h1{margin:0 0 12px}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:end}
label{font-size:12px;color:#475569;display:block;margin-bottom:4px}
input{padding:8px 10px;border:1px solid #cbd5e1;border-radius:8px}
button{padding:8px 12px;border:none;border-radius:8px;background:#1d4ed8;color:#fff;cursor:pointer}
button.gray{background:#6b7280}
pre{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px;white-space:pre-wrap}
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px}th,td{border:1px solid #dbe5f1;padding:8px}th{background:#eff6ff}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>邀请码管理</h1>
    <div class="row">
      <div><label>数量</label><input id="count" type="number" value="1" min="1" max="50"></div>
      <div><label>每码可用次数</label><input id="uses" type="number" value="1" min="1" max="100"></div>
      <div><label>过期日</label><input id="expires" type="date"></div>
      <div><label>备注</label><input id="note" placeholder="给谁"></div>
      <button id="create">生成邀请码</button>
      <button class="gray" id="refresh">刷新列表</button>
      <button class="gray" id="goSite">进入站点</button>
    </div>
    <h3>新生成结果（仅本次）</h3>
    <pre id="out">(暂无)</pre>

    <h3>邀请码列表</h3>
    <table>
      <thead><tr><th>ID</th><th>前缀</th><th>状态</th><th>次数</th><th>过期</th><th>备注</th><th>操作</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>
<script>
const tbody=document.getElementById('tbody');
async function load(){
  const r=await fetch('/api/admin/invites/list');
  const j=await r.json();
  if(!j.ok){location.href='/admin-enter.html';return;}
  tbody.innerHTML='';
  j.items.forEach(x=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${x.id}</td><td>${x.code_prefix||''}</td><td>${x.status}</td><td>${x.used_count}/${x.max_uses}</td><td>${x.expires_at||''}</td><td>${x.note||''}</td><td><button data-id="${x.id}">禁用</button></td>`;
    tr.querySelector('button').onclick=async()=>{await fetch('/api/admin/invites/disable',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({id:x.id})});load();};
    tbody.appendChild(tr);
  });
}
document.getElementById('create').onclick=async()=>{
  const body={count:Number(count.value||1),max_uses:Number(uses.value||1),expires_at:expires.value?new Date(expires.value+'T23:59:59Z').toISOString():null,note:note.value||''};
  const r=await fetch('/api/admin/invites/create',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});
  const j=await r.json();
  if(!j.ok){alert('无权限或创建失败');return;}
  out.textContent=(j.codes||[]).join('\n');
  load();
};
refresh.onclick=load;
goSite.onclick=()=>location.href='/';
load();
</script>
</body>
</html>
